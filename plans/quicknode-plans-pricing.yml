description: QuickNode prices its blockchain infrastructure platform on a monthly subscription model
  with included API credits and a per-million-credit overage rate. Each tier raises the credit allowance,
  the requests-per-second cap, the number of endpoints, and the support SLA. Annual prepayment yields
  roughly a 15% discount. Enterprise is custom-quoted with volume discounts, dedicated clusters, SSO/RBAC,
  SOC2 attestation, and crypto payment options. Charges that exceed $200 in-month are billed immediately
  on Build and above; smaller overages settle at cycle end.
sources:
  - https://www.quicknode.com/pricing
