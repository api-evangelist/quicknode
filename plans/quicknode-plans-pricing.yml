specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: QuickNode
providerId: quicknode
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Streams
- IPFS
- Multi-chain
- Plans
description: QuickNode uses a tiered model with monthly request credits and rate limits
  per tier. Marketplace add-ons are billed separately.
notes: Verify against quicknode.com/pricing for current allotments.
sources:
- https://www.quicknode.com/pricing
plans:
- id: quicknode-free
  name: Free
  type: free
  description: Free tier for development.
  entries:
  - label: Monthly Requests
    name: monthly_requests
    type: included
    metric: requests
    limit: 10000000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: 1 Endpoint
  - name: Community Support
- id: quicknode-build
  name: Build
  type: paid
  description: Entry-level paid tier.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 49
    userMultiplied: false
  - label: Monthly Requests
    name: monthly_requests
    type: included
    metric: requests
    limit: 80000000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Multiple Endpoints
  - name: Email Support
  - name: Add-on Marketplace
- id: quicknode-scale
  name: Scale
  type: paid
  description: Higher-volume tier with priority support.
