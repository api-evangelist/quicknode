specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: QuickNode
providerId: quicknode
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Streams
- IPFS
- Multi-chain
- FinOps
- FOCUS
description: QuickNode bills as monthly subscription with included request credits;
  Marketplace add-ons are metered separately.
notes: Usage visible in QuickNode dashboard; invoices via QuickNode.
sources:
- https://www.quicknode.com/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: QuickNode, Inc.
serviceCategory: Web3
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: QuickNode
  ServiceCategory: Web3
  ProviderName: QuickNode
  PublisherName: QuickNode
  InvoiceIssuerName: QuickNode
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: rpc_requests
  description: Core RPC requests, weighted per method.
  unit: request
  aggregation: sum
  dimensions:
  - endpoint
  - chain
  - method
- name: stream_events
  description: Streams events delivered.
  unit: event
  aggregation: sum
  dimensions:
  - stream
  - chain
- name: ipfs_storage
  description: IPFS pinned bytes.
  unit: byte
  aggregation: max
  dimensions:
  - account
- name: addon_calls
  description: Marketplace add-on calls.
  unit: request
  aggregation: sum
  dimensions:
  - addon
principles:
- name: Visibility
  description: Monitor endpoint usage in the QuickNode dashboard; review per-add-on
    billing line items.
- name: Allocation
  description: Tag endpoints by app/team/env.
- name: Optimization
  description: Disable unused add-ons; batch requests; prefer Streams over polling.
- name: Accountability
  description: Endpoint owners review monthly usage vs allotment.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
