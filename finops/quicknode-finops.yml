description: FOCUS-aligned FinOps for QuickNode - flat monthly subscription per tier plus a per-million-credit
  overage charge driven by method-weighted RPC consumption.
sources:
  - https://www.quicknode.com/pricing
  - https://www.quicknode.com/docs/welcome
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: QuickNode
  ServiceCategory: Blockchain Infrastructure
  ProviderName: QuickNode
  PublisherName: QuickNode Labs, Inc.
  InvoiceIssuerName: QuickNode Labs, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: subscription_fee
    description: Recurring monthly or annual plan fee for the active QuickNode tier (Build, Accelerate,
      Scale, Business, or Enterprise).
    unit: month
    aggregation: sum
    dimensions:
      - plan_tier
      - billing_cycle
  - name: api_credits
    description: Method-weighted credits consumed by RPC, REST, and gRPC requests against the QuickNode
      endpoint.
    unit: credit
    aggregation: sum
    dimensions:
      - endpoint_id
      - chain
      - method
      - plan_tier
  - name: credit_overage
    description: Credits consumed beyond the included monthly credit allowance for the active plan;
      billed per million credits at the plan-specific overage rate.
    unit: credit
    aggregation: sum
    dimensions:
      - endpoint_id
      - chain
      - plan_tier
  - name: endpoints
    description: Active dedicated endpoints provisioned on the account; each plan caps the number permitted.
    unit: endpoint
    aggregation: max
    dimensions:
      - chain
      - region
  - name: addon_usage
    description: Marketplace add-on consumption (e.g. Streams, Webhooks, IPFS pinning, Key-Value Store
      operations) billed by the add-on's own meter.
    unit: varies
    aggregation: sum
    dimensions:
      - addon_name
      - endpoint_id
principles:
  - name: Visibility
    description: Use the QuickNode dashboard to observe credit consumption per endpoint and per method;
      method-level breakdowns highlight which RPC calls (trace_, debug_, archive) dominate spend.
  - name: Allocation
    description: Provision separate endpoints per consuming team, environment, or chain so credit usage
      and overage charges can be attributed; enterprise dedicated clusters allow per-tenant cost isolation.
  - name: Optimization
    description: Cache idempotent reads at the application or CDN tier, prefer batched JSON-RPC where
      supported, choose a tier whose included credit allowance matches steady-state consumption to avoid
      the overage rate, and configure method-level rate limits on Accelerate and above to cap expensive
      methods.
  - name: Accountability
    description: Track subscription tier and overage charges separately; the platform bills overages
      that exceed $200 in-month immediately on Build and above, so set spend alerts proactively. Enterprise
      tenants negotiate dedicated cluster commitments and SOC2 attestation as part of the contract.
maintainers:
