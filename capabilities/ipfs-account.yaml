naftiko: 1.0.0-alpha2
info:
  label: QuickNode IPFS REST API — Account
  description: 'QuickNode IPFS REST API — Account. 1 operations. Lead operation: Get account usage. Self-contained Naftiko
    capability covering one Quicknode business surface.'
  tags:
  - Quicknode
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUICKNODE_API_KEY: QUICKNODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ipfs-account
    baseUri: https://api.quicknode.com/ipfs/rest
    description: QuickNode IPFS REST API — Account business capability. Self-contained, no shared references.
    resources:
    - name: v1-account-usage
      path: /v1/account/usage
      operations:
      - name: getaccountusage
        method: GET
        description: Get account usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.QUICKNODE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ipfs-account-rest
    port: 8080
    description: REST adapter for QuickNode IPFS REST API — Account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/account/usage
      name: v1-account-usage
      description: REST surface for v1-account-usage.
      operations:
      - method: GET
        name: getaccountusage
        description: Get account usage
        call: ipfs-account.getaccountusage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ipfs-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for QuickNode IPFS REST API — Account. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-account-usage
      description: Get account usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ipfs-account.getaccountusage
      outputParameters:
      - type: object
        mapping: $.
