naftiko: 1.0.0-alpha2
info:
  label: QuickNode Streams REST API — Logs
  description: 'QuickNode Streams REST API — Logs. 1 operations. Lead operation: List Stream logs. Self-contained Naftiko
    capability covering one Quicknode business surface.'
  tags:
  - Quicknode
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUICKNODE_API_KEY: QUICKNODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: streams-logs
    baseUri: https://api.quicknode.com/streams/rest/v1
    description: QuickNode Streams REST API — Logs business capability. Self-contained, no shared references.
    resources:
    - name: streams-streamId-logs
      path: /streams/{streamId}/logs
      operations:
      - name: liststreamlogs
        method: GET
        description: List Stream logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: streamId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.QUICKNODE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: streams-logs-rest
    port: 8080
    description: REST adapter for QuickNode Streams REST API — Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/streams/{streamid}/logs
      name: streams-streamid-logs
      description: REST surface for streams-streamId-logs.
      operations:
      - method: GET
        name: liststreamlogs
        description: List Stream logs
        call: streams-logs.liststreamlogs
        with:
          streamId: rest.streamId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streams-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for QuickNode Streams REST API — Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-stream-logs
      description: List Stream logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streams-logs.liststreamlogs
      with:
        streamId: tools.streamId
      outputParameters:
      - type: object
        mapping: $.
