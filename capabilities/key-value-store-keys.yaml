naftiko: 1.0.0-alpha2
info:
  label: QuickNode Key-Value Store REST API — Keys
  description: 'QuickNode Key-Value Store REST API — Keys. 3 operations. Lead operation: Get a value by key. Self-contained
    Naftiko capability covering one Quicknode business surface.'
  tags:
  - Quicknode
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUICKNODE_API_KEY: QUICKNODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: key-value-store-keys
    baseUri: https://api.quicknode.com/kv/rest/v1
    description: QuickNode Key-Value Store REST API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: databases-database-keys-key
      path: /databases/{database}/keys/{key}
      operations:
      - name: getkey
        method: GET
        description: Get a value by key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
      - name: setkey
        method: PUT
        description: Set a value for a key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletekey
        method: DELETE
        description: Delete a key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.QUICKNODE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: key-value-store-keys-rest
    port: 8080
    description: REST adapter for QuickNode Key-Value Store REST API — Keys. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/databases/{database}/keys/{key}
      name: databases-database-keys-key
      description: REST surface for databases-database-keys-key.
      operations:
      - method: GET
        name: getkey
        description: Get a value by key
        call: key-value-store-keys.getkey
        with:
          database: rest.database
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setkey
        description: Set a value for a key
        call: key-value-store-keys.setkey
        with:
          database: rest.database
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletekey
        description: Delete a key
        call: key-value-store-keys.deletekey
        with:
          database: rest.database
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: key-value-store-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for QuickNode Key-Value Store REST API — Keys. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-value-key
      description: Get a value by key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: key-value-store-keys.getkey
      with:
        database: tools.database
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: set-value-key
      description: Set a value for a key
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: key-value-store-keys.setkey
      with:
        database: tools.database
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-key
      description: Delete a key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: key-value-store-keys.deletekey
      with:
        database: tools.database
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
