naftiko: 1.0.0-alpha2
info:
  label: QuickNode Key-Value Store REST API — Database
  description: 'QuickNode Key-Value Store REST API — Database. 3 operations. Lead operation: List databases. Self-contained
    Naftiko capability covering one Quicknode business surface.'
  tags:
  - Quicknode
  - Database
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUICKNODE_API_KEY: QUICKNODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: key-value-store-database
    baseUri: https://api.quicknode.com/kv/rest/v1
    description: QuickNode Key-Value Store REST API — Database business capability. Self-contained, no shared references.
    resources:
    - name: databases
      path: /databases
      operations:
      - name: listdatabases
        method: GET
        description: List databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdatabase
        method: POST
        description: Create a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: databases-database
      path: /databases/{database}
      operations:
      - name: deletedatabase
        method: DELETE
        description: Delete a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.QUICKNODE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: key-value-store-database-rest
    port: 8080
    description: REST adapter for QuickNode Key-Value Store REST API — Database. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/databases
      name: databases
      description: REST surface for databases.
      operations:
      - method: GET
        name: listdatabases
        description: List databases
        call: key-value-store-database.listdatabases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdatabase
        description: Create a database
        call: key-value-store-database.createdatabase
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/databases/{database}
      name: databases-database
      description: REST surface for databases-database.
      operations:
      - method: DELETE
        name: deletedatabase
        description: Delete a database
        call: key-value-store-database.deletedatabase
        with:
          database: rest.database
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: key-value-store-database-mcp
    port: 9090
    transport: http
    description: MCP adapter for QuickNode Key-Value Store REST API — Database. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-databases
      description: List databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: key-value-store-database.listdatabases
      outputParameters:
      - type: object
        mapping: $.
    - name: create-database
      description: Create a database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: key-value-store-database.createdatabase
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-database
      description: Delete a database
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: key-value-store-database.deletedatabase
      with:
        database: tools.database
      outputParameters:
      - type: object
        mapping: $.
